---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

modules:
  - type: script
    snippets:
      - "ln -sf /usr/share/sway-systemd/95-system-keyboard-config.conf /etc/sway/config.d/95-system-keyboard-config.conf"
      - "ln -sf /usr/share/sway-systemd/95-xdg-desktop-autostart.conf /etc/sway/config.d/95-xdg-desktop-autostart.conf"

  # greetd: used for autologin
  - type: dnf
    install:
      packages:
        - greetd
    remove:
      packages:
        - sddm
  - type: systemd
    system:
      enabled:
        - greetd

    # use code for insensitive layout keybinding
    - type: script
      snippets:
         - "sed 's/bindsym/bindsym --to-code/' /etc/sway/config"
