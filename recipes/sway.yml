# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
modules:
  - type: script
    snippets:
      - "ln -sf /usr/share/sway-systemd/95-system-keyboard-config.conf /etc/sway/config.d/95-system-keyboard-config.conf"
      - "ln -sf /usr/share/sway-systemd/95-xdg-desktop-autostart.conf /etc/sway/config.d/95-xdg-desktop-autostart.conf"
  # use code for insensitive layout keybinding
  - type: script
    snippets:
      - "sed -i 's/bindsym/bindsym --to-code/' /etc/sway/config"
  # load keyring with autologin
  - type: script
    snippets:
      - "sed -i '/^auth       include     postlogin/i\auth       optional    pam_systemd_loadkey.so keyname=fido2-pin\nauth       optional    pam_gnome_keyring.so' /etc/pam.d/sddm-autologin"
